name: Tests

on: workflow_dispatch

permissions:
  contents: read

env:
  PYTHONUTF8: 1
  # LLAMA_ARG_HF_REPO: bartowski/Qwen_Qwen3-0.6B-GGUF:q4_k_m
  # LLAMA_ARG_HF_FILE: Qwen_Qwen3-0.6B-Q4_K_M.gguf
  LLAMA_ARG_HF_REPO: Qwen/Qwen3-VL-2B-Instruct-GGUF
  LLAMA_ARG_HF_FILE: Qwen3VL-2B-Instruct-Q4_K_M.gguf
  LLAMA_ARG_MMPROJ: mmproj-Qwen3VL-2B-Instruct-Q8_0.gguf
  LLM_MODEL_DIR: llama_cache

jobs:
  download-models:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          uv python install 3.12
          uv venv

      - name: Install huggingface-hub
        run: uv pip install huggingface-hub[hf_xet]
          
      - name: Download models
        run: |
          uv run hf download ${{ env.LLAMA_ARG_HF_REPO }} ${{ env.LLAMA_ARG_HF_FILE }} \
          --local-dir ${{ env.LLM_MODEL_DIR }}
          uv run hf download ${{ env.LLAMA_ARG_HF_REPO }} ${{ env.LLAMA_ARG_MMPROJ }} \
          --local-dir ${{ env.LLM_MODEL_DIR }}

      - name: Upload model artifact
        uses: actions/upload-artifact@v6
        with:
          name: model
          path: ${{ env.LLM_MODEL_DIR }}
          overwrite: true

  test-linux:
    needs: download-models
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download model artifact
        uses: actions/download-artifact@v7
        with:
          name: model
          path: ${{ env.LLM_MODEL_DIR }}
      
      - name: Check model exists
        run: |
          echo "LLM models:"
          ls -lh ${{ env.LLM_MODEL_DIR }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt

      - name: Test with pytest
        run: |
          uv run pytest -vs

  test-windows:
    needs: download-models
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download model artifact
        uses: actions/download-artifact@v7
        with:
          name: model
          path: ${{ env.LLM_MODEL_DIR }}

      - name: Check model exists
        run: |
          echo "LLM models:"
          dir ${{ env.LLM_MODEL_DIR }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt

      - name: Test with pytest
        run: |
          uv run pytest -vs
